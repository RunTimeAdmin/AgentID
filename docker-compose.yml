version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: agentid-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: agentid
      POSTGRES_PASSWORD: devpassword
      POSTGRES_DB: agentid
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentid -d agentid"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - agentid-network

  redis:
    image: redis:7-alpine
    container_name: agentid-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - agentid-network

volumes:
  postgres_data:
  redis_data:

networks:
  agentid-network:
    driver: bridge
